backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "images"

collections:
  - name: "settings"
    label: "Site Content"
    files:
      - name: "homepage"
        label: "Homepage"
        file: "_data/homepage.json"
        fields:
          - { label: "Hero Eyebrow", name: "hero_eyebrow", widget: "string" }
          - { label: "Hero Subheading", name: "hero_sub", widget: "text" }
          - { label: "Bio Name", name: "bio_name", widget: "string" }
          - { label: "Bio Title", name: "bio_title", widget: "string" }
          - { label: "Bio Text", name: "bio_text", widget: "text" }
          - { label: "About Paragraph 1", name: "about_p1", widget: "text" }
          - { label: "About Paragraph 2", name: "about_p2", widget: "text" }
          - label: "Values"
            name: "values"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Description", name: "desc", widget: "text" }
